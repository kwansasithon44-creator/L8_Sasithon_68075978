{% extends "base.html" %}
{% block title %}เกี่ยวกับเรา | Coffee House{% endblock %}

{% block content %}

<div class="hero-about d-flex align-items-center justify-content-center text-white text-center">
    <h2 class="fw-semibold">
        Welcome to Coffee House
    </h2>
</div>

<div class="container mt-5">

    <h4 class="text-center mb-4" style="color:#5D4037;">
        ภาพกิจกรรม
    </h4>

    <div class="row g-3">

        <div class="col-md-4">
            <img src="https://cdn.pixabay.com/photo/2017/04/25/08/02/coffee-beans-2258839_1280.jpg"
                 class="img-fluid gallery-img" alt="">
        </div>

        <div class="col-md-4">
            <img src="https://cdn.pixabay.com/photo/2020/10/07/12/33/cafe-5635015_1280.jpg"
                 class="img-fluid gallery-img" alt="">
        </div>

        <div class="col-md-4">
            <img src="https://cdn.pixabay.com/photo/2017/03/17/10/29/coffee-2151200_1280.jpg"
                 class="img-fluid gallery-img" alt="">
        </div>

        <div class="col-md-4">
            <img src="https://cdn.pixabay.com/photo/2016/03/30/19/28/coffee-break-1291381_1280.jpg"
                 class="img-fluid gallery-img" alt="">
        </div>

        <div class="col-md-4">
            <img src="https://cdn.pixabay.com/photo/2023/09/05/12/44/mug-8235059_1280.jpg"
                 class="img-fluid gallery-img" alt="">
        </div>

        <div class="col-md-4">
            <img src="https://cdn.pixabay.com/photo/2019/06/02/07/23/coffee-shop-4245788_1280.jpg"
                 class="img-fluid gallery-img" alt="">
        </div>

    </div>

</div>

<style>

.hero-about {
    height: 300px;
    background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
                url('https://cdn.pixabay.com/photo/2020/01/23/04/57/coffee-4786930_1280.jpg') center/cover;
}

.gallery-img {
    border-radius: 12px;
    transition: 0.3s;
    box-shadow: 0 6px 20px rgba(0,0,0,0.08);
}

.gallery-img:hover {
    transform: scale(1.03);
}

</style>

{% endblock %}
