<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Coffee House{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #F5F1ED;
        }

        .navbar {
            background-color: #4B2E2B;
        }

        .navbar a {
            color: #ffffff !important;
            font-weight: 500;
            margin-left: 15px;
            transition: 0.3s;
        }

        .navbar a:hover {
            color: #D7CCC8 !important;
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 20px;
        }

        footer {
            background-color: #4B2E2B;
            color: #ffffff;
            padding: 15px;
            text-align: center;
            margin-top: 50px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg shadow">
    <div class="container">
        <a class="navbar-brand" href="/">Coffee House</a>
        <div>
            <a class="nav-link d-inline" href="/">หน้าแรก</a>
            <a class="nav-link d-inline" href="/form/">แบบฟอร์ม</a>
            <a class="nav-link d-inline" href="/about/">เกี่ยวกับ</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    {% block content %}
    {% endblock %}
</div>

<footer>
    © 2026 Coffee House | Sasithon Saoprakhon
</footer>

</body>
</html>
